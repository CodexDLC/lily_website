[project]
name = "lily_backend"
version = "0.1.0"
description = "My new project scaffolded with codex-django"
dependencies = [
    "django>=5.0",
    "python-dotenv",
    "dj-database-url",
    "psycopg2-binary",
    "loguru",
    "redis>=5.0",
    "codex-django",
    "codex-django-cli",
    "codex-core",
    "django-allauth[socialaccount]",
    "gunicorn>=21.0",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-django",
    "mypy",
    "django-stubs",
    "ruff",
    "bandit",
    "pre-commit",
    "pip-audit",
    "detect-secrets",
]

[project.scripts]
manage = "lily_backend.manage:main"

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "S", "RUF"]
ignore = ["S101", "E402"]

[tool.ruff.lint.per-file-ignores]
"src/*/features/**/migrations/*.py" = ["RUF012"]

[tool.bandit]
exclude_dirs = ["tests", "venv", ".venv"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lily_backend"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "lily_backend.core.settings.test"
pythonpath = ["src", "src/lily_backend"]
testpaths = ["tests"]

[tool.codex-check]
project-name = "lily_backend"
integration-requires = "PostgreSQL, Redis"
test-stages = ["unit", "integration"]
prompt-test-stages = ["integration"]
test-paths = ["tests"]
types-paths = ["src"]
run-extra-checks = true

[[tool.codex-check.extra-commands]]
name = "Docker Lint (Hadolint)"
command = ["hadolint", "deploy/lily_backend/django.Dockerfile"]
skip-if-missing = "hadolint"
