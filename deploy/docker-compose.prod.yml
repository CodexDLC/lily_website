services:
  backend:
    image: ${DOCKER_IMAGE_BACKEND}
    container_name: lily_website-backend
    env_file: .env
    volumes:
      - uploads:/app/media
      - static_volume:/app/staticfiles
      - logs_volume:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always
    networks:
      - lily_website-network

  worker:
    image: ${DOCKER_IMAGE_WORKER}
    container_name: lily_website-worker_arq
    command: arq src.workers.notification_worker.worker.WorkerSettings
    env_file: .env
    volumes:
      - logs_volume:/app/logs
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lily_website-network

  system_worker:
    image: ${DOCKER_IMAGE_WORKER}
    container_name: lily_website-system_worker
    command: arq src.workers.system_worker.worker.WorkerSettings
    env_file: .env
    volumes:
      - logs_volume:/app/logs
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lily_website-network

  db:
    image: postgres:17-alpine
    container_name: lily_website-db
    env_file: .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ${BACKUP_DIR:-/opt/lily_website/backups}:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - lily_website-network

  redis:
    image: redis:7-alpine
    container_name: lily_website-redis
    env_file: .env
    command: >
      sh -c "redis-server --requirepass \"$${REDIS_PASSWORD}\" --appendonly yes"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - lily_website-network

  nginx:
    image: ${DOCKER_IMAGE_NGINX}
    container_name: lily_website-nginx
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    volumes:
      - ./nginx/nginx-main.conf:/etc/nginx/nginx.conf:ro
      - uploads:/app/media:ro
      - static_volume:/app/staticfiles:ro
      - certs_volume:/etc/letsencrypt:ro
      - certbot_challenge_volume:/var/www/certbot:ro
    depends_on:
      - backend
    restart: always
    networks:
      - lily_website-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Certbot is a manual helper only. Certificate renewal is scheduled on the
  # host so the same job can reload the nginx container after a successful renew.
  certbot:
    image: certbot/certbot:v2.11.0
    container_name: lily_website-certbot
    profiles:
      - manual
    volumes:
      - certs_volume:/etc/letsencrypt
      - certbot_challenge_volume:/var/www/certbot
    restart: "no"
    networks:
      - lily_website-network

volumes:
  postgres-data:
  redis-data:
  uploads:
  static_volume:
  logs_volume:
  certs_volume:
  certbot_challenge_volume:

networks:
  lily_website-network:
    driver: bridge
