services:
  db:
    image: postgres:16-alpine
    container_name: ${CONTAINER_PREFIX:-lily_website}-db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=lily_db
      - POSTGRES_USER=lily_user
      - POSTGRES_PASSWORD=lily_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lily_user -d lily_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lily_website-network

  redis:
    image: redis:7-alpine
    container_name: ${CONTAINER_PREFIX:-lily_website}-redis
    env_file:
      - ../.env
    command: >
      sh -c "redis-server --requirepass \"$${REDIS_PASSWORD}\" --appendonly yes"
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - lily_website-network

  backend:
    build:
      context: ..
      dockerfile: deploy/lily_backend/Dockerfile
    container_name: ${CONTAINER_PREFIX:-lily_website}-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - IS_DOCKER=True
      - PROJECT_NAME=lily_backend
    volumes:
      - ../src/lily_backend:/app
      - ../src/lily_backend/media:/app/media
      - static_volume:/app/staticfiles
      - ../logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - lily_website-network

  worker:
    build:
      context: ..
      dockerfile: deploy/worker/Dockerfile
    container_name: ${CONTAINER_PREFIX:-lily_website}-notification_worker
    command: arq src.workers.notification_worker.worker.WorkerSettings
    env_file:
      - ../.env
    environment:
      - PROJECT_NAME=notification_worker
    volumes:
      - ../src/workers:/app/src/workers:ro
      - ../logs:/app/logs
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - lily_website-network

  system_worker:
    build:
      context: ..
      dockerfile: deploy/worker/Dockerfile
    container_name: ${CONTAINER_PREFIX:-lily_website}-system_worker
    command: arq src.workers.system_worker.worker.WorkerSettings
    env_file:
      - ../.env
    environment:
      - PROJECT_NAME=system_worker
    volumes:
      - ../src/workers:/app/src/workers:ro
      - ../logs:/app/logs
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - lily_website-network

  nginx:
    build:
      context: ..
      dockerfile: deploy/nginx/Dockerfile.local
    container_name: ${CONTAINER_PREFIX:-lily_website}-nginx
    ports:
      - "8080:80"
    volumes:
      - ../src/lily_backend/media:/app/media:ro
      - ../logs/nginx:/var/log/nginx
      - static_volume:/app/staticfiles:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lily_website-network

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: ${CONTAINER_PREFIX:-lily_website}-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      - MP_MAX_MESSAGES=500
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
    restart: unless-stopped
    networks:
      - lily_website-network

volumes:
  postgres_data:
  redis-data:
  static_volume:
  # logs_volume removed to use bind mount

networks:
  lily_website-network:
    name: ${CONTAINER_PREFIX:-lily_website}-network
    driver: bridge
