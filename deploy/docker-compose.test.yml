services:
  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=lily_db
      - POSTGRES_USER=lily_user
      - POSTGRES_PASSWORD=lily_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lily_user -d lily_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lily_test-network

  redis:
    image: redis:7-alpine
    env_file:
      - ../.env
    command: >
      sh -c "redis-server --requirepass $${REDIS_PASSWORD} --appendonly yes"
    ports:
      - "6381:6379"
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=${REDIS_PASSWORD} redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - lily_test-network

  backend:
    build:
      context: ..
      dockerfile: deploy/lily_backend/Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - ../.env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENVIRONMENT=testing
      - IS_DOCKER=True
    volumes:
      - ../src/lily_backend:/app
      - ../src/lily_backend/media:/app/media
      - static_test_volume:/app/staticfiles
      - logs_test_volume:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - lily_test-network

  bot:
    build:
      context: ..
      dockerfile: deploy/bot/Dockerfile
    env_file:
      - ../.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BACKEND_URL=http://backend:8000
      - IS_DOCKER=True
    volumes:
      - ../src/telegram_bot:/app/src/telegram_bot:ro
      - logs_test_volume:/app/logs
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - lily_test-network

  worker:
    build:
      context: ..
      dockerfile: deploy/worker/Dockerfile
    command: arq src.workers.notification_worker.worker.WorkerSettings
    env_file:
      - ../.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BACKEND_URL=http://backend:8000
      - IS_DOCKER=True
    volumes:
      - ../src/workers:/app/src/workers:ro
      - logs_test_volume:/app/logs
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - lily_test-network

  system_worker:
    build:
      context: ..
      dockerfile: deploy/worker/Dockerfile
    command: arq src.workers.system_worker.worker.WorkerSettings
    env_file:
      - ../.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BACKEND_URL=http://backend:8000
      - IS_DOCKER=True
    volumes:
      - ../src/workers:/app/src/workers:ro
      - logs_test_volume:/app/logs
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - lily_test-network

  nginx:
    build:
      context: ..
      dockerfile: deploy/nginx/Dockerfile.local
    ports:
      - "8081:80"
    volumes:
      - ../src/lily_backend/media:/app/media:ro
      - static_test_volume:/app/staticfiles:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lily_test-network

  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "8026:8025"
      - "1026:1025"
    environment:
      - MP_MAX_MESSAGES=500
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
    restart: unless-stopped
    networks:
      - lily_test-network

volumes:
  postgres_test_data:
  redis_test_data:
  static_test_volume:
  logs_test_volume:

networks:
  lily_test-network:
    name: lily_test-network
    driver: bridge
