{% comment %}
Google Consent Mode v2 + GTM Integration (Extreme PageSpeed Optimization)
GA4 should be configured INSIDE GTM to avoid double loading.
{% endcomment %}

{% if site_settings.google_tag_manager_id %}
<script>
  // 1. Initialize dataLayer & Consent Mode (Must be in HEAD)
  window.dataLayer = window.dataLayer || [];
  function gtag() { dataLayer.push(arguments); }

  const savedConsent = localStorage.getItem('cookie_consent');
  const consentStatus = savedConsent === 'granted' ? 'granted' : 'denied';

  gtag('consent', 'default', {
    'ad_storage': consentStatus,
    'ad_user_data': consentStatus,
    'ad_personalization': consentStatus,
    'analytics_storage': consentStatus,
    'wait_for_update': 500
  });

  // 2. Optimized Lazy Load Function
  function loadAnalytics() {
    if (window.analyticsLoaded) return;
    window.analyticsLoaded = true;

    // Load GTM Script only (GA4 should be a tag inside GTM)
    (function (w, d, s, l, i) {
      w[l] = w[l] || []; w[l].push({
        'gtm.start': new Date().getTime(), event: 'gtm.js'
      });
      var f = d.getElementsByTagName(s)[0],
        j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : '';
      j.async = true;
      j.src = 'https://www.googletagmanager.com/gtm.js?id=' + i + dl;
      f.parentNode.insertBefore(j, f);
    })(window, document, 'script', 'dataLayer', '{{ site_settings.google_tag_manager_id }}');

    console.log('Analytics (GTM) loaded');
  }

  // 3. Trigger loading on interaction OR when browser is idle
  const interactionEvents = ['mouseover', 'keydown', 'touchmove', 'scroll', 'click'];

  interactionEvents.forEach(event => {
    window.addEventListener(event, loadAnalytics, { once: true, passive: true });
  });

  // Fallback: Load after 7 seconds or when idle
  window.addEventListener('load', () => {
    if ('requestIdleCallback' in window) {
      requestIdleCallback(() => {
        setTimeout(loadAnalytics, 2000); // Wait 2s more after idle
      });
    } else {
      setTimeout(loadAnalytics, 7000); // 7s fallback for older browsers
    }
  });

  // 4. HTMX Integration
  document.addEventListener('htmx:afterOnLoad', function (evt) {
    loadAnalytics();
    if (window.dataLayer) {
      window.dataLayer.push({
        'event': 'htmx_page_view',
        'page_path': evt.detail.pathInfo.requestPath,
        'page_title': document.title
      });
    }
  });
</script>
{% endif %}
