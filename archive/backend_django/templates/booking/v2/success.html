{% load i18n %}
<div class="step-content fade-in" style="text-align: center; padding: 40px 20px;">
    <div style="font-size: 56px; margin-bottom: 16px;">🎉</div>
    <h3 style="font-size: 24px; font-weight: 700; margin-bottom: 8px;">Запись подтверждена!</h3>
    <p style="color: var(--color-text-muted); margin-bottom: 32px;">
        Мы ждём вас. Детали записи придут на email.
    </p>

    {% if group %}
    <div style="background: var(--color-surface); border-radius: 16px; padding: 20px; margin-bottom: 32px; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto;">
        <div style="font-size: 13px; color: var(--color-text-muted); margin-bottom: 4px;">Номер записи</div>
        <div style="font-weight: 700; font-size: 18px; margin-bottom: 16px;">#{{ group.pk }}</div>
        <div style="font-size: 13px; color: var(--color-text-muted); margin-bottom: 4px;">Дата</div>
        <div style="font-weight: 600; margin-bottom: 16px;">{{ group.booking_date }}</div>
    </div>
    {% endif %}

    <a href="{% url 'booking_v2_wizard' %}" class="btn-primary" style="display: inline-block; text-decoration: none;">
        Записаться ещё раз
    </a>
</div>
