{% load i18n %}
<form hx-post="{% url 'cabinet:clients' %}?action=save&id={{ client.id }}"
      hx-target="#client-card-{{ client.id }}"
      hx-swap="outerHTML"
      class="client-edit-form">
    {% csrf_token %}

    <div class="card-header-row">
        <span class="card-client-name">{% trans "Editing Client" %} #{{ client.id }}</span>
    </div>

    <div class="client-info-list">
        <div class="client-info-item">
            <i class="bi bi-person"></i>
            <input type="text" name="first_name" value="{{ client.first_name }}" class="client-edit-input" placeholder="{% trans "First Name" %}">
        </div>
        <div class="client-info-item">
            <i class="bi bi-person"></i>
            <input type="text" name="last_name" value="{{ client.last_name }}" class="client-edit-input" placeholder="{% trans "Last Name" %}">
        </div>
        <div class="client-info-item">
            <i class="bi bi-telephone"></i>
            <input type="text" name="phone" value="{{ client.phone }}" class="client-edit-input" placeholder="{% trans "Phone" %}">
        </div>
        <div class="client-info-item">
            <i class="bi bi-envelope"></i>
            <input type="email" name="email" value="{{ client.email }}" class="client-edit-input" placeholder="{% trans "Email" %}">
        </div>
        <div class="client-info-item">
            <i class="bi bi-instagram"></i>
            <input type="text" name="instagram" value="{{ client.instagram }}" class="client-edit-input" placeholder="Instagram">
        </div>
        <div class="client-info-item">
            <i class="bi bi-telegram"></i>
            <input type="text" name="telegram" value="{{ client.telegram }}" class="client-edit-input" placeholder="Telegram">
        </div>
        <div class="client-info-item">
            <i class="bi bi-card-text"></i>
            <textarea name="notes" class="client-edit-input" style="min-height: 80px;" placeholder="{% trans "Internal Notes" %}">{{ client.notes }}</textarea>
        </div>
    </div>

    <div class="client-edit-actions">
        <button type="submit" class="btn-save-client">{% trans "Save" %}</button>
        <button type="button" class="btn-cancel-client"
                hx-get="{% url 'cabinet:clients' %}?action=view&id={{ client.id }}"
                hx-target="#client-card-{{ client.id }}"
                hx-swap="outerHTML">
            {% trans "Cancel" %}
        </button>
    </div>
</form>
