{% load i18n %}
<div id="masters-list" class="masters-grid">
{% for master in masters %}
    {% include "cabinet/crm/masters/_single_card.html" %}
{% empty %}
    <div class="grid-span-all text-center py-5">
        <div class="d-flex flex-column align-items-center justify-content-center" style="min-height: 200px; background: rgba(255, 255, 255, 0.02); border-radius: 16px; border: 1px dashed rgba(255, 255, 255, 0.1);">
            <i class="bi bi-person-badge mb-2" style="font-size: 2.5rem; color: var(--color-gold); opacity: 0.5;"></i>
            <h5 class="text-white fw-bold mb-1">{% trans "No masters found" %}</h5>
        </div>
    </div>
{% endfor %}
</div>
