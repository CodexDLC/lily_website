{% load i18n %}
<div class="mail-row {% if not req.is_processed %}unread{% endif %}"
     id="contact-card-{{ req.id }}"
     hx-get="{% url 'cabinet:contacts' %}?action=view&id={{ req.id }}"
     hx-target="this"
     hx-swap="outerHTML">

    <div class="mail-status-dot {% if not req.is_processed %}new{% else %}processed{% endif %}"></div>

    <div class="mail-sender">
        {{ req.client.display_name }}
    </div>

    <div class="mail-subject-preview">
        <strong>[{{ req.get_topic_display }}]</strong>
        {{ req.message|truncatechars:100 }}
    </div>

    <div class="mail-row-edit-icon">
        <i class="bi bi-pencil-square"></i>
    </div>

    <div class="mail-time">
        {{ req.created_at|date:"d M" }}
    </div>
</div>
