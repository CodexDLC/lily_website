{% load i18n %}

<div class="calendar-sidebar-widget">
    <div class="calendar-header-v2 mb-3">
        <button class="cal-nav-btn"
                hx-get="{% url 'cabinet:appointments' %}?month={{ current_month|add:'-1' }}&year={{ current_year }}&status={{ status_filter }}&mode={{ view_mode }}"
                hx-target="#cabinet-content"
                hx-swap="innerHTML">
            <i class="bi bi-chevron-left"></i>
        </button>
        <span class="fw-bold text-white fs-6">{{ month_label }}</span>
        <button class="cal-nav-btn"
                hx-get="{% url 'cabinet:appointments' %}?month={{ current_month|add:'1' }}&year={{ current_year }}&status={{ status_filter }}&mode={{ view_mode }}"
                hx-target="#cabinet-content"
                hx-swap="innerHTML">
            <i class="bi bi-chevron-right"></i>
        </button>
    </div>

    <div class="calendar-grid-mini" style="margin-bottom: 10px;">
        <div class="text-center small text-white-50 fw-bold">Mo</div>
        <div class="text-center small text-white-50 fw-bold">Tu</div>
        <div class="text-center small text-white-50 fw-bold">We</div>
        <div class="text-center small text-white-50 fw-bold">Th</div>
        <div class="text-center small text-white-50 fw-bold">Fr</div>
        <div class="text-center small text-white-50 fw-bold">Sa</div>
        <div class="text-center small text-white-50 fw-bold">Su</div>

        {% for day in calendar_days %}
            {% if day.status == 'empty' %}
                <div class="cal-day-spacer"></div>
            {% else %}
                <div class="cal-day-v2 {{ day.status }} {% if day.is_active %}active{% endif %} {% if day.is_today %}is-today{% endif %}"
                     {% if day.status != 'disabled' %}
                     hx-get="{% url 'cabinet:appointments' %}?date={{ day.date }}&status={{ status_filter }}&mode={{ view_mode }}"
                     hx-target="#cabinet-content"
                     hx-swap="innerHTML"
                     hx-push-url="true"
                     {% endif %}>
                    {{ day.num }}
                </div>
            {% endif %}
        {% endfor %}
    </div>

    <div class="mt-3 pt-3" style="border-top: 1px solid rgba(255, 255, 255, 0.05);">
        {% if selected_date %}
            <button class="btn-reset-date w-100 mb-2"
                    hx-get="{% url 'cabinet:appointments' %}?status={{ status_filter }}&mode={{ view_mode }}"
                    hx-target="#cabinet-content"
                    hx-swap="innerHTML"
                    hx-push-url="true"
                    style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--color-gold); padding: 8px; border-radius: 8px; font-size: 0.8rem; cursor: pointer;">
                <i class="bi bi-x-circle me-1"></i> {% trans "Show All Dates" %}
            </button>
        {% endif %}

        <div class="sidebar-info-hint mb-0" style="background: rgba(255, 255, 255, 0.03); border-radius: 8px; border-left: 3px solid var(--color-gold); padding: 12px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.5);">
             <i class="bi bi-info-circle me-1 text-white-50"></i>
             {% trans "Select a date to filter records on the left" %}
        </div>
    </div>
</div>
