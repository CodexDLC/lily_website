{% load i18n %}
<div class="cabinet-card" id="appt-{{ appt.id }}">
    <div class="card-header-row">
        <div class="card-header-left">
            <span class="card-client-name">{% trans "Confirm Appointment" %}</span>
        </div>
    </div>

    <form hx-post="{% url 'cabinet:appointments' %}" hx-target="#appt-{{ appt.id }}" hx-swap="outerHTML">
        {% csrf_token %}
        <input type="hidden" name="id" value="{{ appt.id }}">
        <input type="hidden" name="action" value="approve">

        <!-- 1. Reply to Client (Public) -->
        <div class="card-edit-row" style="margin-top: 15px;">
            <label style="color: #4ade80; font-size: 13px; font-weight: bold; display: block; margin-bottom: 5px;">
                <i class="bi bi-envelope-heart"></i> {% trans "Reply to Client (Sent in Confirmation Email)" %}
            </label>
            <textarea name="admin_reply"
                      class="card-edit-textarea"
                      placeholder="{% trans 'e.g. Yes, you can pay by card! Looking forward to seeing you.' %}"
                      style="width: 100%; background: rgba(74, 222, 128, 0.05); border: 1px solid rgba(74, 222, 128, 0.2); color: white; padding: 10px; border-radius: 6px; min-height: 80px;"></textarea>
            <div style="font-size: 11px; color: #888; margin-top: 4px;">
                {% trans "This message will be included in the email sent to the client." %}
            </div>
        </div>

        <!-- 2. Internal Admin Notes (Private) -->
        <div class="card-edit-row" style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;">
            <label style="color: #888; font-size: 12px; display: block; margin-bottom: 5px;">
                <i class="bi bi-lock"></i> {% trans "Internal Admin Note (Private)" %}
            </label>
            <textarea name="admin_notes"
                      class="card-edit-textarea"
                      style="width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #ccc; padding: 8px; border-radius: 4px; min-height: 50px;">{{ appt.admin_notes|default:"" }}</textarea>
        </div>

        <div class="card-actions" style="margin-top: 25px; display: flex; gap: 10px;">
            <button type="submit" class="btn-card-save" style="flex: 1; background: #4ade80; color: black; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer;">
                {% trans "Confirm & Send Email" %}
            </button>
            <button type="button" class="btn-card-edit"
                    hx-get="{% url 'cabinet:appointments' %}?action=view_card&id={{ appt.id }}"
                    hx-target="#appt-{{ appt.id }}"
                    hx-swap="outerHTML"
                    style="flex: 1; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 6px; cursor: pointer;">
                {% trans "Back" %}
            </button>
        </div>
    </form>
</div>
