<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#003831">
    <title>Нет сети - LILY Beauty Salon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #003831; /* LILY Brand Color */
            color: white;
            text-align: center;
            padding: 20px;
        }

        .offline-container {
            max-width: 400px;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.2;
            color: #d4af37; /* Gold accent if applicable, or white */
        }

        p {
            font-size: 1.125rem;
            opacity: 0.9;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        button {
            background: #d4af37;
            color: #003831;
            border: none;
            padding: 14px 32px;
            border-radius: 2px; /* More classic look for salon */
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: white;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 2rem;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            font-size: 0.875rem;
            backdrop-filter: blur(10px);
        }

        .connection-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            margin-right: 8px;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .connection-indicator.online {
            background: #22c55e;
            animation: none;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="icon">📶</div>
        <h1>Нет подключения</h1>
        <p>Проверьте интернет-соединение. Мы автоматически обновим страницу, когда сеть появится.</p>
        <button onclick="window.location.reload()">Обновить</button>

        <div class="status">
            <span class="connection-indicator" id="indicator"></span>
            <span id="status-text">Офлайн</span>
        </div>
    </div>

    <script>
        function updateConnectionStatus() {
            const indicator = document.getElementById('indicator');
            const statusText = document.getElementById('status-text');

            if (navigator.onLine) {
                indicator.classList.add('online');
                statusText.textContent = 'Подключено';
                // Авто-релоад при появлении сети
                setTimeout(() => window.location.reload(), 1000);
            } else {
                indicator.classList.remove('online');
                statusText.textContent = 'Офлайн';
            }
        }

        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);
        updateConnectionStatus();
    </script>
</body>
</html>
