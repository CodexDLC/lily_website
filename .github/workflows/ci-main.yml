name: CI Main (Quality & Testing)

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

jobs:
  quality-and-tests:
    name: Quality (Lint, Types, Security, Tests)
    runs-on: ubuntu-latest

    services:
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root --with dev

      - name: Run Ruff (Lint & Format)
        run: |
          poetry run ruff check src/
          poetry run ruff format src/ --check

      - name: Run Mypy (Types)
        run: poetry run mypy src/

      - name: Security Audit (pip-audit)
        run: poetry run pip-audit --local

      - name: Security SAST (Bandit)
        run: poetry run bandit -r src/ -ll

      - name: Run Pytest
        env:
          SECRET_KEY: "test_secret_key_for_ci"
          ENVIRONMENT: "testing"
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"
        run: poetry run pytest

  build-check:
    name: Docker Build Check (Cached)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/backend/Dockerfile
          push: false
          tags: check-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build Bot
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/bot/Dockerfile
          push: false
          cache-from: type=gha,scope=bot
          cache-to: type=gha,mode=max,scope=bot

      - name: Build Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/worker/Dockerfile
          push: false
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Build Nginx
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/nginx/Dockerfile
          push: false
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx
