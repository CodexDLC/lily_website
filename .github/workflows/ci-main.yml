name: CI Main (Quality & Testing)

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

jobs:
  quality-and-tests:
    name: Quality (Lint, Types, Security, Tests)
    runs-on: ubuntu-latest

    services:
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Load cached venv
        id: cached-uv-environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: v1-venv-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Ruff (Lint & Format)
        run: |
          uv run ruff check src/
          uv run ruff format src/ --check

      - name: Run Mypy (Types)
        run: uv run mypy src/

      - name: Security Audit (pip-audit)
        run: uv run pip-audit

      - name: Security SAST (Bandit)
        run: uv run bandit -r src/ -ll

      - name: Run Unit Tests (with coverage gate)
        env:
          SECRET_KEY: "test_secret_key_for_ci"  # pragma: allowlist secret
          FIELD_ENCRYPTION_KEY: "vT1_9X9-D9Z2h8E_9X9-D9Z2h8E_9X9-D9Z2h8E_9X8=" # pragma: allowlist secret
          ENVIRONMENT: "testing"
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"
        run: uv run pytest -m "unit or not integration" --cov=src --cov-report=xml --cov-fail-under=90

      - name: Run Integration Tests (no coverage gate)
        env:
          SECRET_KEY: "test_secret_key_for_ci"  # pragma: allowlist secret
          FIELD_ENCRYPTION_KEY: "vT1_9X9-D9Z2h8E_9X9-D9Z2h8E_9X9-D9Z2h8E_9X8=" # pragma: allowlist secret
          ENVIRONMENT: "testing"
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"
        run: uv run pytest -m "integration" --no-cov

  build-check:
    name: Docker Build Check (Cached)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/lily_backend/Dockerfile
          push: false
          tags: check-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build Bot
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/bot/Dockerfile
          push: false
          cache-from: type=gha,scope=bot
          cache-to: type=gha,mode=max,scope=bot

      - name: Build Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/worker/Dockerfile
          push: false
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Build Nginx
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/nginx/Dockerfile
          push: false
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx
