name: CI Main (Quality & Testing)

on:
  workflow_dispatch: # Позволяет запускать тесты вручную
  pull_request:
    branches: [ main ]

jobs:
  quality-and-tests:
    name: Linting, Types & Tests
    runs-on: ubuntu-latest

    services:
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest

      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root --with dev

      - name: Run Ruff
        run: poetry run ruff check src/

      - name: Run Mypy
        run: poetry run mypy src/

      - name: Run Pytest
        env:
          SECRET_KEY: "test_secret_key_for_ci"
          ENVIRONMENT: "testing"
        run: poetry run pytest

  build-check:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/backend/Dockerfile
          push: false
          load: true
          tags: check-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Scan Backend Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'check-backend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Build Bot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/bot/Dockerfile
          push: false
          tags: check-bot:latest
          cache-from: type=gha,scope=bot
          cache-to: type=gha,mode=max,scope=bot

      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/worker/Dockerfile
          push: false
          tags: check-worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Build Nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/nginx/Dockerfile
          push: false
          tags: check-nginx:latest
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx

  integration-test:
    name: Integration Tests (Docker Compose)
    runs-on: ubuntu-latest
    needs: [build-check]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "SECRET_KEY=test_secret" >> .env
          echo "DEBUG=True" >> .env
          echo "POSTGRES_DB=lily_db" >> .env
          echo "POSTGRES_USER=lily_user" >> .env
          echo "POSTGRES_PASSWORD=lily_password" >> .env
          echo "REDIS_PASSWORD=redis_pass" >> .env
          echo "BOT_TOKEN=123:test" >> .env
          echo "CONTAINER_PREFIX=ci_test" >> .env

      - name: Start Containers
        run: docker compose -f deploy/docker-compose.test.yml up -d --build

      - name: Wait for Healthchecks
        run: |
          timeout 60s bash -c 'until docker ps | grep "healthy"; do sleep 2; done' || docker compose -f deploy/docker-compose.test.yml logs

      - name: Check Backend Health
        run: curl --fail http://localhost:8001/api/v1/health || exit 1

      - name: Stop Containers
        if: always()
        run: docker compose -f deploy/docker-compose.test.yml down
