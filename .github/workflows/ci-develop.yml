name: CI Develop (Fast Quality Check)

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  lint:
    name: Linting & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Load cached venv
        id: cached-uv-environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: v1-venv-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}

      - name: Install dependencies
        if: steps.cached-uv-environment.outputs.cache-hit != 'true'
        run: uv sync --frozen

      - name: Run Ruff
        run: uv run ruff check src/

      - name: Run Mypy
        run: uv run mypy src/

      - name: Run Trivy (FS Scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          trivy-config: trivy.yaml
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
