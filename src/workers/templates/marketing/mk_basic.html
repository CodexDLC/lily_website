{% extends "base_email.html" %}

{% block title %}{{ subject }}{% endblock title %}

{% block content %}
    {% if is_marketing %}
    <tr>
        <td align="center" style="padding-bottom: 30px;">
            <table border="0" cellpadding="0" cellspacing="0">
                <tr>
                    <td align="center" style="background-color: #fcf2da; border: 1px solid #e9b306; border-radius: 4px; padding: 10px 20px;">
                        <span style="font-family: Arial, sans-serif; color: #e9b306; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; font-weight: bold;">
                            ANGEBOT 🌟
                        </span>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
    {% endif %}

    <tr>
        <td style="padding-bottom: 20px; color: #555555; font-family: Arial, sans-serif; font-size: 17px; line-height: 1.6;">
            {{ greeting|default('') }}
        </td>
    </tr>

    <tr>
        <td style="color: #333333; font-family: Arial, sans-serif; font-size: 16px; line-height: 1.7; white-space: pre-wrap;">
            {{ body_text }}
        </td>
    </tr>

    <tr><td height="40" style="font-size: 0; line-height: 0;">&nbsp;</td></tr>

    <tr>
        <td align="center" style="color: #aaaaaa; font-family: Arial, sans-serif; font-size: 12px;">
            <a href="{{ unsubscribe_url }}" style="color: #aaaaaa; text-decoration: underline;">
                Abmelden / Unsubscribe
            </a>
        </td>
    </tr>
{% endblock content %}
