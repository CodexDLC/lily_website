{% load i18n %}
<div class="row g-4">
  <div class="col-12">

    <div class="card border-0 shadow-sm mb-4">
      <div class="card-header bg-white border-0 pt-3 pb-0">
        <h6 class="fw-semibold mb-0">{% trans "Recruitment Status" %}</h6>
      </div>
      <div class="card-body d-flex flex-column gap-3">

        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" name="hiring_active" id="hiring_active"
                 {% if settings_data.hiring_active %}checked{% endif %}>
          <label class="form-check-label text-muted" for="hiring_active" style="font-size:.8rem;">
            {% trans "Show 'Hiring' block on Team page" %}
          </label>
        </div>

        <div class="mt-2">
          <label class="form-label text-muted mb-1" style="font-size:.8rem;">{% trans "Hiring Title" %}</label>
          <input type="text" name="hiring_title" value="{{ settings_data.hiring_title|default:'' }}"
                 class="form-control form-control-sm border-0 bg-light">
        </div>

        <div>
          <label class="form-label text-muted mb-1" style="font-size:.8rem;">{% trans "Hiring Text" %}</label>
          <textarea name="hiring_text" rows="4"
                    class="form-control form-control-sm border-0 bg-light">{{ settings_data.hiring_text|default:'' }}</textarea>
        </div>

      </div>
    </div>

  </div>
</div>
