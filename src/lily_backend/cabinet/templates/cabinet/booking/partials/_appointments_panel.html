{% load i18n %}

<div id="appointments-panel">
  <div class="card border-0 shadow-sm mb-4" style="background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0 !important;">
    <div class="card-body p-3">
      <form id="booking-filters"
            hx-get="{% url 'cabinet:booking_list' %}"
            hx-target="#appointments-panel"
            hx-swap="outerHTML"
            hx-push-url="true"
            hx-indicator="#appointments-indicator"
            hx-trigger="keyup changed delay:400ms from:input[name='search'], change from:select[name='master_id'], change from:input[name='date_from'], change from:input[name='date_to']"
            class="row g-3 align-items-end">
        <div class="col-md-4">
          <label class="form-label text-muted fw-semibold mb-1" style="font-size: .75rem; text-transform: uppercase; letter-spacing: .02em;">
            {% trans "Search Client or Service" %}
          </label>
          <div class="input-group input-group-sm">
            <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-search"></i></span>
            <input type="text" name="search" class="form-control border-start-0 ps-0"
                   placeholder="{% trans 'Name, phone, or service...' %}"
                   value="{{ request.GET.search|default:'' }}">
          </div>
        </div>

        <div class="col-md-3">
          <label class="form-label text-muted fw-semibold mb-1" style="font-size: .75rem; text-transform: uppercase; letter-spacing: .02em;">
            {% trans "Specialist" %}
          </label>
          <select name="master_id" class="form-select form-select-sm">
            <option value="">{% trans "All Specialists" %}</option>
            {% for m in masters_list %}
            <option value="{{ m.id }}" {% if request.GET.master_id == m.id|stringformat:"s" %}selected{% endif %}>{{ m.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-5">
          <label class="form-label text-muted fw-semibold mb-1" style="font-size: .75rem; text-transform: uppercase; letter-spacing: .02em;">
            {% trans "Date Range" %}
          </label>
          <div class="d-flex align-items-center gap-2">
            <input type="date" name="date_from" class="form-control form-control-sm" value="{{ request.GET.date_from|default:'' }}">
            <span class="text-muted small">{% trans "to" %}</span>
            <input type="date" name="date_to" class="form-control form-control-sm" value="{{ request.GET.date_to|default:'' }}">
          </div>
        </div>

        <input type="hidden" name="status" value="{{ current_status|default:'all' }}">
      </form>
    </div>
  </div>

  <div class="d-flex gap-2 mb-4 flex-wrap">
    {% for key, val in counts.items %}
    <button type="button"
            hx-get="{% url 'cabinet:booking_list' %}?status={{ key }}"
            hx-target="#appointments-panel"
            hx-swap="outerHTML"
            hx-push-url="true"
            hx-include="#booking-filters input[name='search'], #booking-filters select[name='master_id'], #booking-filters input[name='date_from'], #booking-filters input[name='date_to']"
            hx-indicator="#appointments-indicator"
            class="btn btn-sm {% if current_status == key %}btn-dark{% else %}btn-outline-secondary{% endif %}"
            style="font-size: .8rem; border-radius: 20px; transition: all 0.2s;">
      {% if key == 'all' %}{% trans "All Appointments" %}{% else %}{{ key|capfirst }}{% endif %}
      <span class="ms-1 {% if current_status == key %}text-white-50{% else %}text-muted{% endif %}" style="font-size: .72rem;">({{ val }})</span>
    </button>
    {% endfor %}
    <div id="appointments-indicator" class="htmx-indicator spinner-border spinner-border-sm text-primary ms-auto align-self-center" role="status"></div>
  </div>

  {% include "cabinet/booking/partials/_appointments_table.html" %}
</div>
