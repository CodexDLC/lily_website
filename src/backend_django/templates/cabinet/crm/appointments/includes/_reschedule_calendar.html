{% load i18n %}

<div class="calendar-layout mt-4">
    <!-- CALENDAR WIDGET -->
    <div class="calendar-widget">
        <div class="calendar-header">
            <button class="cal-nav-btn"
                    hx-get="{% url 'cabinet:reschedule_appointment' token %}?action=load_calendar&month={{ current_month|add:'-1' }}&year={{ current_year }}"
                    hx-target="#reschedule-picker">
                ‹
            </button>
            <span class="cal-month-title">{{ month_label }}</span>
            <button class="cal-nav-btn"
                    hx-get="{% url 'cabinet:reschedule_appointment' token %}?action=load_calendar&month={{ current_month|add:'1' }}&year={{ current_year }}"
                    hx-target="#reschedule-picker">
                ›
            </button>
        </div>

        <div class="calendar-weekdays">
            <span>Mo</span><span>Di</span><span>Mi</span><span>Do</span><span>Fr</span><span>Sa</span><span>So</span>
        </div>

        <div class="calendar-days">
            {% for day in calendar_days %}
                {% if day.status == 'empty' %}
                    <span class="day empty"></span>
                {% elif day.status == 'disabled' %}
                    <button class="day disabled" disabled>{{ day.num }}</button>
                {% elif day.status == 'holiday' %}
                    <button class="day holiday" title="{{ day.title }}" disabled>{{ day.num }}</button>
                {% else %}
                    <button class="day {% if day.date == selected_date %}active{% endif %}"
                            hx-get="{% url 'cabinet:reschedule_appointment' token %}"
                            hx-vals='{"action": "load_slots", "date": "{{ day.date }}"}'
                            hx-target="#reschedule-slots">
                        {{ day.num }}
                    </button>
                {% endif %}
            {% endfor %}
        </div>
    </div>

    <!-- TIME SLOTS PANEL -->
    <div id="reschedule-slots" class="time-slots-panel">
        <div class="calendar-info-empty">
            {% trans "Please select a date." %}
        </div>
    </div>
</div>
