{% load i18n %}
<div class="cabinet-card resched-group-card" id="group-{{ group_id }}" style="border-left: 4px solid #a855f7;">
    <div class="card-header-row">
        <div class="card-header-left">
            <span class="card-client-name" style="color: #a855f7;">{% trans "Reschedule Group" %} #{{ group_id }}</span>
        </div>
        <div class="card-header-right">
            <button type="button" class="btn-card-edit"
                    hx-get="{% url 'cabinet:appointments' %}?action=view_group&group_id={{ group_id }}"
                    hx-target="#group-{{ group_id }}"
                    hx-swap="outerHTML"
                    style="background: transparent; border: none; color: #888;">
                ✕
            </button>
        </div>
    </div>

    <!-- Date Scroller (Same as Solo) -->
    <div class="date-scroller" style="display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px;">
        {% for day in calendar_days %}
        <button class="date-chip"
                hx-get="{% url 'cabinet:appointments' %}?action=group_reschedule_form&group_id={{ group_id }}&date={{ day.date }}"
                hx-target="#group-{{ group_id }}"
                hx-swap="outerHTML"
                style="
                    background: {% if day.is_selected %}#a855f7{% else %}rgba(255,255,255,0.05){% endif %};
                    border: 1px solid {% if day.is_selected %}#a855f7{% else %}rgba(255,255,255,0.1){% endif %};
                    border-radius: 8px;
                    padding: 8px 12px;
                    color: white;
                    min-width: 60px;
                    text-align: center;
                    cursor: pointer;
                    transition: all 0.2s;
                ">
            <div style="font-size: 10px; opacity: 0.7;">{{ day.weekday }}</div>
            <div style="font-weight: bold; font-size: 14px;">{{ day.day }}</div>
        </button>
        {% endfor %}
    </div>

    <!-- Slots Grid (Same as Solo) -->
    <div class="slots-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-height: 200px; overflow-y: auto; margin-bottom: 15px;">
        {% for slot in slots %}
        <button type="button" class="slot-btn"
                onclick="selectGroupSlot(this, '{{ slot }}', '{{ group_id }}')"
                style="
                    background: rgba(255,255,255,0.05);
                    border: 1px solid rgba(255,255,255,0.1);
                    color: white;
                    padding: 8px;
                    border-radius: 4px;
                    cursor: pointer;
                    transition: all 0.2s;
                ">
            {{ slot }}
        </button>
        {% empty %}
        <div style="grid-column: 1 / -1; text-align: center; color: #888; padding: 20px;">
            {% trans "No slots available" %}
        </div>
        {% endfor %}
    </div>

    <!-- Hidden Form for Submission -->
    <form hx-post="{% url 'cabinet:appointments' %}" hx-target="#group-{{ group_id }}" hx-swap="outerHTML">
        {% csrf_token %}
        <input type="hidden" name="group_id" value="{{ group_id }}">
        <input type="hidden" name="action" value="reschedule_group">
        <input type="hidden" name="new_date" value="{{ selected_date }}">
        <input type="hidden" name="new_time" id="selected-time-group-{{ group_id }}">

        <button type="submit" id="confirm-reschedule-group-{{ group_id }}" class="btn-create-submit" disabled
                style="background: #a855f7; color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;">
            {% trans "Confirm Group Reschedule" %}
        </button>
    </form>

    <script>
        function selectGroupSlot(btn, time, groupId) {
            const container = btn.closest('.slots-grid');
            container.querySelectorAll('.slot-btn').forEach(b => {
                b.style.background = 'rgba(255,255,255,0.05)';
                b.style.borderColor = 'rgba(255,255,255,0.1)';
            });
            btn.style.background = 'rgba(168, 85, 247, 0.2)';
            btn.style.borderColor = '#a855f7';
            document.getElementById('selected-time-group-' + groupId).value = time;
            document.getElementById('confirm-reschedule-group-' + groupId).disabled = false;
        }

        // Enable horizontal scrolling with mouse wheel for the date scroller
        (function() {
            const scroller = document.querySelector('#group-{{ group_id }} .date-scroller');
            if (scroller) {
                scroller.addEventListener('wheel', function(e) {
                    if (e.deltaY !== 0) {
                        e.preventDefault();
                        scroller.scrollLeft += e.deltaY;
                    }
                });
            }
        })();
    </script>
</div>
