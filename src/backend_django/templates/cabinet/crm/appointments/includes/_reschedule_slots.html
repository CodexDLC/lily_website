{% load i18n %}

<h4 class="slots-title">{% trans "Verfügbare Zeit am" %} {{ selected_date|date:"d.m." }}</h4>

{% if not slots %}
    <div class="calendar-info-empty">
        {% trans "No times available on this date." %}
    </div>
{% else %}
    <div class="slots-grid-compact">
        {% for s in slots %}
            <form hx-post="{% url 'cabinet:reschedule_appointment' token %}" hx-target="#reschedule-main-card">
                {% csrf_token %}
                <input type="hidden" name="action" value="confirm_new_slot">
                <input type="hidden" name="datetime_str" value="{{ s.datetime_str }}">
                <button type="submit" class="slot-btn" hx-confirm="{% trans 'Termin umbuchen auf' %} {{ s.datetime_str }}?">
                    {{ s.time }}
                </button>
            </form>
        {% endfor %}
    </div>
{% endif %}
