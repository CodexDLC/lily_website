{% load i18n %}
<div class="cabinet-card" id="appt-{{ appt.id }}">
    <div class="card-header-row">
        <div class="card-header-left">
            <span class="card-client-name">{% trans "Confirm Appointment" %}</span>
        </div>
    </div>

    <form hx-post="{% url 'cabinet:appointments' %}" hx-target="#appt-{{ appt.id }}" hx-swap="outerHTML">
        {% csrf_token %}
        <input type="hidden" name="id" value="{{ appt.id }}">
        <input type="hidden" name="action" value="approve">

        <div style="margin-top: 15px; color: #aaa; font-size: 13px;">
            {% trans "Client will receive a confirmation email." %}
        </div>

        <div class="card-edit-row" style="margin-top: 10px;">
            <label style="color: #888; font-size: 12px;">{% trans "Admin Note (Optional)" %}</label>
            <textarea name="admin_notes" class="card-edit-textarea" style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px; border-radius: 4px; min-height: 60px;">{{ appt.admin_notes|default:"" }}</textarea>
        </div>

        <div class="card-actions" style="margin-top: 20px; display: flex; gap: 10px;">
            <button type="submit" class="btn-card-save" style="flex: 1; background: #4ade80; color: black; border: none; padding: 10px; border-radius: 4px; font-weight: bold;">
                {% trans "Confirm" %}
            </button>
            <button type="button" class="btn-card-edit"
                    hx-get="{% url 'cabinet:appointments' %}?action=view_card&id={{ appt.id }}"
                    hx-target="#appt-{{ appt.id }}"
                    hx-swap="outerHTML"
                    style="flex: 1; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; border-radius: 4px;">
                {% trans "Back" %}
            </button>
        </div>
    </form>
</div>
