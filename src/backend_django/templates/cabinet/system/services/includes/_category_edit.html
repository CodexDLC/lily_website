{% load i18n %}
<div class="category-header" id="cat-header-{{ category.id }}">
    <form hx-post="{% url 'cabinet:services' %}" hx-target="#cat-header-{{ category.id }}" hx-swap="outerHTML" class="w-100">
        {% csrf_token %}
        <input type="hidden" name="id" value="{{ category.id }}">
        <input type="hidden" name="action" value="update_category">

        <div class="edit-form-row">
            <!-- DE -->
            <div class="lang-input-group">
                <span class="lang-label">DE</span>
                <input type="text" name="title_de" value="{{ category.title_de|default:'' }}" class="lang-input">
            </div>
            <!-- RU -->
            <div class="lang-input-group">
                <span class="lang-label">RU</span>
                <input type="text" name="title_ru" value="{{ category.title_ru|default:'' }}" class="lang-input">
            </div>
            <!-- EN -->
            <div class="lang-input-group">
                <span class="lang-label">EN</span>
                <input type="text" name="title_en" value="{{ category.title_en|default:'' }}" class="lang-input">
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-3">
            <label class="edit-checkbox-label">
                <input type="checkbox" name="is_active" {% if category.is_active %}checked{% endif %}>
                {% trans "Active" %}
            </label>

            <div class="d-flex gap-2">
                <button type="submit" class="btn-card-save">{% trans "Save" %}</button>
                <button type="button" class="btn-card-edit"
                        hx-get="{% url 'cabinet:services' %}?action=view_category&id={{ category.id }}"
                        hx-target="#cat-header-{{ category.id }}"
                        hx-swap="outerHTML">
                    ✕
                </button>
            </div>
        </div>
    </form>
</div>
