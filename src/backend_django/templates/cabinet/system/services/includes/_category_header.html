{% load i18n %}
<div class="category-header" id="cat-header-{{ category.id }}">
    <div class="d-flex align-items-center gap-2">
        <h3 class="c-cabinet-title-gold mb-0 category-title">{{ category.title }}</h3>
        {% if not category.is_active %}
            <span class="status-badge status-cancelled" style="font-size: 9px;">{% trans "Disabled" %}</span>
        {% endif %}
    </div>

    <button class="btn-card-edit"
            hx-get="{% url 'cabinet:services' %}?action=edit_category&id={{ category.id }}"
            hx-target="#cat-header-{{ category.id }}"
            hx-swap="outerHTML"
            title="{% trans 'Category Settings' %}">
        ⚙️
    </button>
</div>
