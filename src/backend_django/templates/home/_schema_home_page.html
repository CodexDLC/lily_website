{% load static %}
{% load i18n %}

<script type="application/ld+json">
[
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "{% firstof seo.seo_title site_settings.company_name %}",
    "description": "{% firstof seo.seo_description "Premium Beauty Salon in Köthen." %}",
    "url": "{{ request.build_absolute_uri }}"
  },
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "@id": "{{ site_settings.site_base_url }}#organization",
    "name": "{{ site_settings.company_name }}",
    "image": "{{ site_settings.site_base_url }}{% static 'img/logo_lily.webp' %}",
    "telephone": "{{ site_settings.phone }}",
    "email": "{{ site_settings.email }}",
    "priceRange": "{{ site_settings.price_range }}",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "{{ site_settings.address_street }}",
      "addressLocality": "{{ site_settings.address_locality }}",
      "postalCode": "{{ site_settings.address_postal_code }}",
      "addressCountry": "DE"
    },
    "geo": {
      "@type": "GeoCoordinates",
      "latitude": "{% load l10n %}{% localize off %}{{ site_settings.latitude }}{% endlocalize %}",
      "longitude": "{% localize off %}{{ site_settings.longitude }}{% endlocalize %}"
    },
    "url": "{{ site_settings.site_base_url }}",
    "openingHoursSpecification": [
      {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": [
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday"
        ],
        "opens": "{{ site_settings.work_start_weekdays|date:'H:i' }}",
        "closes": "{{ site_settings.work_end_weekdays|date:'H:i' }}"
      },
      {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": "Saturday",
        "opens": "{{ site_settings.work_start_saturday|date:'H:i' }}",
        "closes": "{{ site_settings.work_end_saturday|date:'H:i' }}"
      }
    ],
    "sameAs": [
      "{{ site_settings.facebook_url|default:'https://www.facebook.com/lilybeautysalonkoethen/' }}",
      "{{ site_settings.instagram_url }}"
    ],
    "potentialAction": {
      "@type": "ReserveAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "{{ site_settings.site_base_url }}/{% if LANGUAGE_CODE != 'de' %}{{ LANGUAGE_CODE }}/{% endif %}booking/",
        "inLanguage": "{{ LANGUAGE_CODE }}",
        "actionPlatform": [
          "https://schema.org/DesktopWebPlatform",
          "https://schema.org/MobileWebPlatform"
        ]
      },
      "result": {
        "@type": "Reservation",
        "name": "{% trans "Online-Terminbuchung" %}"
      }
    },
    "hasOfferCatalog": {
      "@type": "OfferCatalog",
      "name": "{% trans "Beauty Services" %}",
      "itemListElement": [
        {% for cat in bento %}
        {
          "@type": "OfferCatalog",
          "name": "{{ cat.title }}",
          "itemListElement": [
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "{{ cat.title }}",
                "url": "{{ site_settings.site_base_url }}{% url 'service_detail' slug=cat.slug %}"
              }
            }
          ]
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
      ]
    }
  }
]
</script>
