[pytest]
; Pytest configuration for lily_backend (2.0 platform)
; Usage: pytest -c pytest-lily.ini
DJANGO_SETTINGS_MODULE = core.settings.test
pythonpath = . src/lily_backend
testpaths = src/lily_backend
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    unit: Unit tests (no DB)
    integration: Integration tests (with DB)
addopts = --tb=short -q
